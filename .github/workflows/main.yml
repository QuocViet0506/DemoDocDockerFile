name: Tự động Deploy lên Docker Hub

on:
  push:
    branches: [ "main" ] # Chỉ chạy khi có code đẩy lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Mượn máy ảo Ubuntu của Github để chạy

    steps:
      - name: Bước 1 - Checkout code từ Github
       uses: actions/checkout@v6.0.2

      - name: Bước 2 - Đăng nhập vào kho Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Bước 3 - Đóng gói và Đẩy Image lên Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .              # Thư mục chứa Dockerfile
          file: ./Dockerfile      # Dockerfile gốc của dự án Spring Boot
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/demodocdockerfile:latest
