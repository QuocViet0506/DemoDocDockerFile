name: Tự động Deploy lên Docker Hub

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code từ Github
        uses: actions/checkout@v6.0.2

      # 2. Debug secrets (quan trọng)
      - name: Debug secrets
        run: |
          echo "Username OK: ${{ secrets.DOCKER_QUOCVIET != '' }}"
          echo "Password OK: ${{ secrets.DOCKER_PASSWORD != '' }}"

      # 3. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_QUOCVIET }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Setup Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build & Push Docker Image
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: halequocviet/halequocviet-app:latest

      # 6. Deploy webhook
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="halequocviet/halequocviet-app"
          CONTAINER_PORT=80

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=7&container_port=$CONTAINER_PORT&strict_container_port=0")

          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "Webhook HTTP: $CODE"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại"
            echo "$BODY"
            exit 1
          fi

          echo "Deploy thành công"
